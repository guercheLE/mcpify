name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # sqlite-vec's native extension loading is platform-sensitive —
        # this matrix is the primary defense against a fix that only works
        # on the maintainer's own machine.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  e2e:
    # The slow, real acceptance gate (Story 14 / REQ-2.5.1): npm install
    # (including the @xenova/transformers model download) and npm test
    # against a generated project. Only on pushes to main, not every PR,
    # to keep PR feedback fast — it takes minutes, not seconds.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cargo test --test e2e_generation -- --ignored
