name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # sqlite-vec's native extension loading is platform-sensitive —
        # this matrix is the primary defense against a fix that only works
        # on the maintainer's own machine.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  e2e:
    # The slow, real acceptance gate for both targets (v1 Story 14 / v2
    # Story R8, PRD REQ-2.5.1): the TypeScript test does npm install
    # (including the @xenova/transformers model download) and npm test;
    # the Rust test does cargo run --bin populate-embeddings (including
    # the fastembed model download) and cargo test — both against a
    # generated project, both in tests/e2e_generation.rs, so this one
    # `cargo test` invocation runs both. Only on pushes to main, not every
    # PR, to keep PR feedback fast — it takes minutes, not seconds. No
    # separate Rust toolchain install needed here unlike a hypothetical
    # third target's job would need: this workflow already runs on Rust,
    # since mcpify itself is Rust.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cargo test --test e2e_generation -- --ignored
